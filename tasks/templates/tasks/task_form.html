{% extends 'base.html' %}

{% block title %}{{ title }} - TaskSphere{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-10">
    <div class="glass-card animate__animated animate__fadeInUp">
        <div class="p-8 border-b border-slate-100 dark:border-slate-800">
            <h2 class="text-3xl font-black flex items-center gap-3">
                <i class="fas fa-pen-nib text-blue-600"></i> {{ title }}
            </h2>
        </div>
        
        <div class="p-8">
            <form method="post" novalidate class="space-y-6">
                {% csrf_token %}
                <div class="task-form-custom">
                    {{ form.as_p }}
                </div>
                
                <div class="flex items-center gap-4 pt-6">
                    <button type="submit" class="flex-grow py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl shadow-xl transition-all transform hover:scale-[1.02]">
                        <i class="fas fa-save mr-2"></i> Finalize Task
                    </button>
                    <a href="{% url 'tasks:dashboard' %}" class="px-8 py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold opacity-70 hover:opacity-100 transition-all">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Premium Input Styling */
    .task-form-custom input, .task-form-custom textarea, .task-form-custom select {
        @apply w-full px-5 py-4 bg-slate-50 dark:bg-slate-900/50 border-2 border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-slate-800 rounded-2xl outline-none transition-all !important;
    }
    .task-form-custom label {
        @apply font-black text-xs uppercase tracking-widest text-slate-500 mb-2 block !important;
    }
    .asteriskField { display: none; }
</style>
{% endblock %}
