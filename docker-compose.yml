version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: tasksphere_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-tasksphere}
      POSTGRES_USER: ${DB_USER:-tasksphere_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tasksphere_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: tasksphere_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 tasksphere.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${PORT:-8000}:8000"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: postgresql://${DB_USER:-tasksphere_user}:${DB_PASSWORD:-secure_password_123}@db:5432/${DB_NAME:-tasksphere}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: tasksphere_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data:

networks:
  default:
    name: tasksphere_network