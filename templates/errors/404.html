<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Sphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body class="text-white font-sans">
    <div class="glass p-12 rounded-3xl shadow-2xl max-w-lg w-full text-center relative z-10 mx-4 animate__animated animate__fadeIn">
        <div class="text-8xl mb-8 floating inline-block text-blue-400">
            <i class="fas fa-user-astronaut"></i>
        </div>
        
        <h1 class="text-9xl font-black opacity-10 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 select-none">404</h1>
        
        <h2 class="text-3xl font-bold mb-4">Houston, we have a problem.</h2>
        <p class="text-slate-400 mb-8 leading-relaxed">
            This task doesn't exist in our orbit. Either you've discovered a black hole, or you just mistyped the URL. 
            <span class="italic block mt-2">Don't panic! Deep breaths.</span>
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl font-bold transition-all transform hover:scale-105 shadow-lg shadow-blue-500/20">
                Return to Base
            </a>
            <button onclick="history.back()" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold transition-all">
                Go Back
            </button>
        </div>
    </div>

    <div class="absolute top-10 left-10 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl animate-pulse"></div>
    <div class="absolute bottom-10 right-10 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl animate-pulse"></div>
</body>
</html>
